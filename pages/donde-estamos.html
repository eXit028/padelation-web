  <!-- DÓNDE ESTAMOS -->
  <section id="donde-estamos">
    <div class="container">
      <div class="map-inner">
        <div class="map-info">
          <div class="section-tag">Ubicación</div>
          <h2 class="section-title">¿Dónde estamos?</h2>
          <p class="section-desc">A solo unos minutos de Zaragoza, en Cuarte de Huerva. Fácil acceso y zona de aparcamiento.</p>
          <div class="contact-items">
            <div class="contact-item">
              <div class="ci-icon"><i class="fa-solid fa-location-dot"></i></div>

                <span>Camino Ralenco 16, CP 50.410<br>Cuarte de Huerva, Zaragoza</span>
              </div>
            </div>
            <div class="contact-item">
              <div class="ci-icon"><i class="fa-solid fa-phone"></i></div>
              <div class="ci-text">
                <strong>Teléfono (solo urgencias)</strong>
                <span><a href="tel:653148942">653 148 942</a></span>
              </div>
            </div>
            <div class="contact-item">
              <div class="ci-icon"><i class="fa-solid fa-envelope"></i></div>
              <div class="ci-text">
                <strong>Email</strong>
                <span><a href="mailto:contacto@padelation.es">contacto@padelation.es</a></span>
              </div>
            </div>
            <div class="contact-item">
              <div class="ci-icon"><i class="fa-solid fa-clock"></i></div>
              <div class="ci-text">
                <strong>Horario</strong>
                <span>Abierto 24 horas, los 365 días del año</span>
              </div>
            </div>
          </div>
        </div>
        <div class="map-embed">
