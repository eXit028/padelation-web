<!DOCTYPE html>
<html lang="es">
<head>
  <!-- Codificacion de caracteres -->
  <meta charset="UTF-8" />
  <!-- Configuracion para hacer la página responsive -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <!-- Título de la pestaña -->
  <title>Padelation 24H </title>
  <!-- Imports para las fuentes de texto de google -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <!-- Carga del archivo CSS -->
  <link rel="stylesheet" href="../assets/css/style.css" />
</head>

<body>

  <!-- NAV -->
  <div id="nav-placeholder"></div>
  
  <!-- INSTALACIONES -->
  <section id="instalaciones">
    <div class="container">
      <div class="section-tag">Nuestras instalaciones</div>
      <h2 class="section-title">La pista</h2>
      <p class="section-desc">Una instalación pensada para que solo tengas que pensar en jugar bien.</p>

      <!-- Slider de fotos (sustituir src por fotos reales) -->
      <div class="slider-wrap">
        <div class="slider">
          <div class="slider-track">
            <div class="slide active court-1">
              <svg class="slider-placeholder-svg" viewBox="0 0 200 120" fill="none" xmlns="http://www.w3.org/2000/svg">
                <rect x="10" y="10" width="180" height="100" rx="4" stroke="rgba(255,255,255,0.5)" stroke-width="2" fill="none"/>
                <line x1="100" y1="10" x2="100" y2="110" stroke="rgba(255,255,255,0.5)" stroke-width="1.5"/>
                <line x1="10" y1="60" x2="190" y2="60" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
                <rect x="40" y="25" width="120" height="70" stroke="rgba(255,255,255,0.4)" stroke-width="1.5" fill="none"/>
              </svg>
              <div class="slide-label">Pista principal</div>
            </div>
            <div class="slide court-2">
              <span style="font-size:4rem;opacity:.4">🌡️</span>
              <div class="slide-label">Climatización</div>
            </div>
            <div class="slide court-3">
              <span style="font-size:4rem;opacity:.4">💡</span>
              <div class="slide-label">Iluminación LED</div>
            </div>
            <div class="slide court-4">
              <span style="font-size:4rem;opacity:.4">🔒</span>
              <div class="slide-label">Acceso 24h</div>
            </div>
            <div class="slide court-5">
              <span style="font-size:4rem;opacity:.4">🅿️</span>
              <div class="slide-label">Aparcamiento</div>
            </div>
          </div>
          <button class="slider-btn slider-prev" aria-label="Anterior">&#8249;</button>
          <button class="slider-btn slider-next" aria-label="Siguiente">&#8250;</button>
        </div>
        <div class="slider-dots">
          <span class="dot active"></span>
          <span class="dot"></span>
          <span class="dot"></span>
          <span class="dot"></span>
          <span class="dot"></span>
        </div>
      </div>
    </div>
  </section>

  <!-- FOOTER -->
  <div id="footer-placeholder"></div>

  <script src="../assets/js/main.js"></script>


</body>
</html>
