<!DOCTYPE html>
<html lang="es">
<head>
  <!-- Codificacion de caracteres -->
  <meta charset="UTF-8" />
  <!-- Configuracion para hacer la página responsive -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <!-- Título de la pestaña -->
  <title>Padelation 24H </title>
  <link rel="icon" type="image/png" href="../assets/images/logo/favicon_web.png" />
  <!-- Imports para las fuentes de texto de google -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <!-- Carga del archivo CSS -->
  <link rel="stylesheet" href="../assets/css/style.css" />
</head>

<body>

  <!-- NAV -->
  <div id="nav-placeholder"></div>
  
  <!-- INSTALACIONES -->
  <section id="instalaciones">
    <div class="container">
      <div class="section-tag">Nuestras instalaciones</div>
      <h2 class="section-title">La pista</h2>
      <p class="section-desc">Una instalación pensada para que solo tengas que pensar en jugar bien. Ponemos a tu disposición cómodos vestuarios completamente equipados, con duchas amplias
      y funcionales para que puedas relajarte después de cada partido.</p>

      <div class="instalaciones-grid">
        <!-- SLIDER -->
        <div class="slider-wrap">
          <div class="slider">
            <div class="slider-track">
              <div class="slide active">
                <img src="../assets/images/galeria/pista.jpg" alt="Pista principal" class="slide-img" />
                <div class="slide-label">Pista principal</div>
              </div>
              <div class="slide">
                <img src="../assets/images/galeria/vestuario1.jpg" alt="Vestuario" class="slide-img" />
                <div class="slide-label">Vestuario</div>
              </div>
              <div class="slide">
                <img src="../assets/images/galeria/vestuario2.jpg" alt="Vestuario" class="slide-img" />
                <div class="slide-label">Vestuario</div>
              </div>
            </div>
            <button class="slider-btn slider-prev" aria-label="Anterior">&#10094;</button>
            <button class="slider-btn slider-next" aria-label="Siguiente">&#10095;</button>
          </div>
          <div class="slider-dots">
            <span class="dot active"></span>
            <span class="dot"></span>
            <span class="dot"></span>
          </div>
        </div>

        <!-- WIDGET METEOROLOGÍA -->
        <div class="weather-widget" id="weather-widget"></div>
      </div>
    </div>
  </section>

  <!-- FOOTER -->
  <div id="footer-placeholder"></div>

  <script src="../assets/js/main.js"></script>


</body>
</html>
